<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            padding: 20px;
        }

        .parent {
            position: relative;
            width: 300px;
            height: 200px;
            background: #e0e0e0;
            margin: 20px;
            text-align: center;
        }

        .child {
            position: absolute;
            bottom: 10px;
            right: 10px;
            border-radius: 30%;
            width: 80px;
            height: 50px;
            line-height: 50px;
            background: #d4a01d;
            padding: 5px 10px;
            color: white;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            color: white;


        }
    </style>

</head>

<body>
    <div class="parent">
        Parent div
        <div class="child">child</div>
        <div class="badge">badge</div>
    </div>
    <div class="parent" style="position: static;">parent static <div class="child">Absolute</div>
    </div>

</body>

</html>
