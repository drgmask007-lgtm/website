<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden</title>
    <style>
        .div1 {
            background-color: lightblue;
            width: 100%;
            height: 100px;
            visibility: hidden;
        }

        .div2 {
            background-color: lightcoral;
            width: 100%;
            height: 100px;
        }
    </style>
</head>

<body>
    <div class="div1"> This is div1
    </div>
    <div class="div2">This is div2</div>

</body>

</html>
