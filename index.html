<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        .container {
            background-color: lightcyan;
            display: flex;
            flex-direction: row;
        }

        .box {
            display: flex;
            flex-direction: row;
            width: 220px;
            height: 50px;
            background-color: lightblue;

            margin-right: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">First box</div>
        <div class="box">Second box</div>
        <div class="box">Third box</div>
    </div>


</body>

</html>
